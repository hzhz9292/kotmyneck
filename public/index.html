<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>3 Кота: Онлайн Аэрохоккей</title>
  <style>
    :root {
      --bg1: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255,255,255,0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #f59e0b;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e3a8a 0%, var(--bg1) 42%, #020617 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(180deg, rgba(2,6,23,0.68), rgba(2,6,23,0.90));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 20;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .hidden { display: none !important; }

    .panel {
      width: min(980px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
      padding: 18px;
    }

    .title {
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 16px;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.35;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .value {
      font-weight: 800;
      font-size: clamp(20px, 3vw, 30px);
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .character {
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      padding: 12px;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select: none;
      color: white;
    }

    .character:active { transform: scale(0.98); }

    .character.selected {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.12);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.10) inset;
    }

    .avatar {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: clamp(24px, 3vw, 34px);
      margin-bottom: 8px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.22);
      pointer-events: none;
    }

    .c1 { background: linear-gradient(135deg, #fb7185, #f59e0b); }
    .c2 { background: linear-gradient(135deg, #f472b6, #60a5fa); }
    .c3 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .c4 { background: linear-gradient(135deg, #34d399, #3b82f6); }

    .char-name {
      text-align: center;
      font-weight: 800;
      font-size: 17px;
      pointer-events: none;
    }

    .char-role {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      pointer-events: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      color: #fff;
      background: none;
      min-height: 52px;
    }

    button:active { transform: scale(0.99); }

    .primary {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      min-width: 190px;
    }

    .secondary {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.10);
      min-width: 160px;
    }

    .hud {
      position: absolute;
      top: max(6px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(900px, calc(100% - 10px));
      z-index: 8;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      pointer-events: none;
    }

    .hud-box {
      background: rgba(2,6,23,0.56);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 6px 8px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      min-width: 0;
    }

    .hud-main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .small {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.05;
    }

    .big {
      font-size: clamp(11px, 2.8vw, 16px);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.15;
    }

    .score {
      font-size: clamp(18px, 4.5vw, 28px);
      font-weight: 900;
      line-height: 1;
      min-width: 62px;
      text-align: center;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      background: rgba(2,6,23,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      z-index: 12;
      max-width: 92vw;
      text-align: center;
    }

    .center-note {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      background: rgba(2,6,23,0.74);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 12px 16px;
      font-weight: 900;
      font-size: clamp(18px, 4vw, 28px);
      z-index: 10;
      text-align: center;
      max-width: 90vw;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: max(50px, calc(env(safe-area-inset-bottom) + 28px));
      transform: translateX(-50%);
      background: rgba(2,6,23,0.52);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted);
      z-index: 7;
      max-width: 94vw;
      text-align: center;
      pointer-events: none;
    }

    @media (max-width: 860px) {
      .character-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .stats { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .primary, .secondary { width: 100%; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .hud {
        top: max(4px, env(safe-area-inset-top));
        width: calc(100% - 8px);
        gap: 4px;
      }

      .hud-box {
        padding: 4px 6px;
        border-radius: 10px;
      }

      .small { font-size: 9px; }
      .big { font-size: 11px; }
      .score {
        font-size: 18px;
        min-width: 52px;
      }

      .center-note {
        font-size: 18px;
        padding: 10px 12px;
      }

      .hint {
        bottom: max(34px, calc(env(safe-area-inset-bottom) + 10px));
        font-size: 10px;
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="hud-box">
      <div class="small">Ты</div>
      <div class="big" id="youName">—</div>
    </div>

    <div class="hud-box hud-main">
      <div>
        <div class="small">Счёт</div>
        <div class="score" id="scoreText">0 : 0</div>
      </div>
      <div>
        <div class="small">Статус</div>
        <div class="big" id="statusText">Меню</div>
      </div>
    </div>

    <div class="hud-box" style="text-align:right">
      <div class="small">Соперник</div>
      <div class="big" id="enemyName">—</div>
    </div>
  </div>

  <div id="centerNote" class="center-note hidden"></div>
  <div id="toast" class="toast hidden"></div>
  <div id="hint" class="hint hidden">Веди пальцем по своей половине поля</div>

  <div class="overlay" id="menu">
    <div class="panel">
      <div class="title">3 Кота: Онлайн Аэрохоккей</div>
      <div class="subtitle">Быстрый матч 1 на 1. Выбирай персонажа, жми кнопку и жди второго игрока.</div>

      <div class="stats">
        <div class="stat">
          <div class="label">ЭЛО</div>
          <div class="value" id="eloValue">1000</div>
        </div>
        <div class="stat">
          <div class="label">Уровень</div>
          <div class="value" id="levelValue">1</div>
        </div>
        <div class="stat">
          <div class="label">Матчей</div>
          <div class="value" id="matchesValue">0</div>
        </div>
      </div>

      <div class="character-grid" id="characterGrid"></div>

      <div class="actions">
        <button class="primary" id="findBtn" type="button">Играть онлайн</button>
        <button class="secondary" id="resetBtn" type="button">Сбросить прогресс</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="resultOverlay">
    <div class="panel" style="max-width:680px">
      <div class="title" id="resultTitle">Матч окончен</div>
      <div class="subtitle" id="resultSub">Подсчёт награды…</div>

      <div class="stats">
        <div class="stat">
          <div class="label">Награда</div>
          <div class="value" id="gainValue">+0</div>
        </div>
        <div class="stat">
          <div class="label">Твоя ЭЛО</div>
          <div class="value" id="newEloValue">1000</div>
        </div>
        <div class="stat">
          <div class="label">Уровень</div>
          <div class="value" id="newLevelValue">1</div>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="againBtn" type="button">Новый матч</button>
        <button class="secondary" id="menuBtn" type="button">В меню</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const menu = document.getElementById('menu');
  const resultOverlay = document.getElementById('resultOverlay');
  const centerNote = document.getElementById('centerNote');
  const toast = document.getElementById('toast');
  const hint = document.getElementById('hint');

  const scoreText = document.getElementById('scoreText');
  const statusText = document.getElementById('statusText');
  const youName = document.getElementById('youName');
  const enemyName = document.getElementById('enemyName');

  const eloValue = document.getElementById('eloValue');
  const levelValue = document.getElementById('levelValue');
  const matchesValue = document.getElementById('matchesValue');

  const gainValue = document.getElementById('gainValue');
  const newEloValue = document.getElementById('newEloValue');
  const newLevelValue = document.getElementById('newLevelValue');
  const resultTitle = document.getElementById('resultTitle');
  const resultSub = document.getElementById('resultSub');

  const findBtn = document.getElementById('findBtn');
  const resetBtn = document.getElementById('resetBtn');
  const againBtn = document.getElementById('againBtn');
  const menuBtn = document.getElementById('menuBtn');

  const STORAGE_KEY = 'three_cats_online_progress_v5';

  const characters = [
    { name: 'Гоня', role: 'Быстрый старт', cls: 'c1', short: 'Г' },
    { name: 'Карамелька', role: 'Точный удар', cls: 'c2', short: 'К' },
    { name: 'Коржик', role: 'Сильный напор', cls: 'c3', short: 'К' },
    { name: 'Компот', role: 'Спокойный контроль', cls: 'c4', short: 'К' }
  ];

  let progress = loadProgress();
  let selectedCharacter = progress.character || 'Гоня';

  let mySide = null;
  let gameState = null;
  let gameFinishedHandled = false;

  let config = {
    width: 1280,
    height: 720,
    goalHeight: 210,
    malletRadius: 48,
    puckRadius: 22
  };

  let localMallet = null;
  let remoteMallet = null;
  let pointerActive = false;
  let rafId = null;
  let lastFrame = performance.now();

  const socket = io({
    transports: ['websocket', 'polling']
  });

  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch {}
    return { elo: 1000, matches: 0, character: 'Гоня' };
  }

  function saveProgress() {
    progress.character = selectedCharacter;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }

  function getLevel(elo) {
    return Math.floor(Math.max(0, elo - 1000) / 1000) + 1;
  }

  function renderMenuStats() {
    eloValue.textContent = progress.elo;
    levelValue.textContent = getLevel(progress.elo);
    matchesValue.textContent = progress.matches;
  }

  function renderCharacters() {
    const grid = document.getElementById('characterGrid');
    grid.innerHTML = '';

    characters.forEach(char => {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'character' + (selectedCharacter === char.name ? ' selected' : '');
      el.innerHTML = `
        <div class="avatar ${char.cls}">${char.short}</div>
        <div class="char-name">${char.name}</div>
        <div class="char-role">${char.role}</div>
      `;
      el.onclick = () => {
        selectedCharacter = char.name;
        saveProgress();
        renderCharacters();
        showToast('Выбран: ' + char.name, 900);
      };
      grid.appendChild(el);
    });
  }

  function showToast(text, time = 1800) {
    toast.textContent = text;
    toast.classList.remove('hidden');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.add('hidden'), time);
  }

  function showCenter(text) {
    centerNote.textContent = text;
    centerNote.classList.remove('hidden');
  }

  function hideCenter() {
    centerNote.classList.add('hidden');
  }

  function showHint(text) {
    hint.textContent = text;
    hint.classList.remove('hidden');
  }

  function hideHint() {
    hint.classList.add('hidden');
  }

  function clamp(v, a, b) {
    return Math.max(a, Math.min(b, v));
  }

  function len(x, y) {
    return Math.hypot(x, y);
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function scaleX(x) {
    return (x / config.width) * window.innerWidth;
  }

  function scaleY(y) {
    return (y / config.height) * window.innerHeight;
  }

  function screenToWorldX(x) {
    return (x / window.innerWidth) * config.width;
  }

  function screenToWorldY(y) {
    return (y / window.innerHeight) * config.height;
  }

  function worldRadius(r) {
    const sx = window.innerWidth / config.width;
    const sy = window.innerHeight / config.height;
    return r * Math.min(sx, sy);
  }

  function constrainLocalTarget(x, y) {
    let nx = screenToWorldX(x);
    let ny = screenToWorldY(y);

    if (mySide === 'left') {
      nx = clamp(nx, config.malletRadius + 8, config.width / 2 - config.malletRadius - 10);
    } else {
      nx = clamp(nx, config.width / 2 + config.malletRadius + 10, config.width - config.malletRadius - 8);
    }

    ny = clamp(ny, config.malletRadius + 8, config.height - config.malletRadius - 8);

    return { x: nx, y: ny };
  }

  function pushPointer(clientX, clientY) {
    if (!mySide) return;
    const p = constrainLocalTarget(clientX, clientY);

    if (!localMallet) {
      localMallet = { x: p.x, y: p.y, vx: 0, vy: 0, tx: p.x, ty: p.y };
    }

    localMallet.tx = p.x;
    localMallet.ty = p.y;
    localMallet.x = p.x;
    localMallet.y = p.y;

    socket.emit('move', { x: p.x, y: p.y });
  }

  function setupInput() {
    canvas.addEventListener('pointerdown', (e) => {
      if (!mySide) return;
      pointerActive = true;
      pushPointer(e.clientX, e.clientY);
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('pointermove', (e) => {
      if (!pointerActive || !mySide) return;
      pushPointer(e.clientX, e.clientY);
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('pointerup', () => pointerActive = false);
    window.addEventListener('pointercancel', () => pointerActive = false);
  }

  function drawRoundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawArena() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const goalTop = scaleY(config.height / 2 - config.goalHeight / 2);
    const goalBottom = scaleY(config.height / 2 + config.goalHeight / 2);
    const centerX = scaleX(config.width / 2);

    ctx.clearRect(0, 0, w, h);

    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, '#0b1220');
    bg.addColorStop(1, '#0f1f3d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    const pad = Math.max(8, Math.min(16, w * 0.02));
    drawRoundedRect(pad, pad, w - pad * 2, h - pad * 2, 24);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.stroke();

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.035)';
    ctx.fillRect(pad, pad, centerX - pad, h - pad * 2);
    ctx.fillRect(centerX, pad, w - centerX - pad, h - pad * 2);

    ctx.setLineDash([12, 14]);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(centerX, pad);
    ctx.lineTo(centerX, h - pad);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(centerX, h / 2, Math.min(w, h) * 0.12, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(245,158,11,0.65)';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(pad, goalTop);
    ctx.lineTo(pad, goalBottom);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(w - pad, goalTop);
    ctx.lineTo(w - pad, goalBottom);
    ctx.stroke();

    ctx.restore();
  }

  function malletLook(character) {
    const map = {
      'Гоня': ['#fb7185', '#f59e0b', 'Г'],
      'Карамелька': ['#f472b6', '#60a5fa', 'К'],
      'Коржик': ['#f59e0b', '#ef4444', 'К'],
      'Компот': ['#34d399', '#3b82f6', 'К']
    };
    return map[character] || ['#f59e0b', '#ef4444', '?'];
  }

  function drawMallet(player, mine) {
    if (!player) return;

    const x = scaleX(player.x);
    const y = scaleY(player.y);
    const r = worldRadius(config.malletRadius);

    const [a, b, letter] = malletLook(player.character);
    const grad = ctx.createLinearGradient(x - r, y - r, x + r, y + r);
    grad.addColorStop(0, a);
    grad.addColorStop(1, b);

    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.lineWidth = mine ? 5 : 3;
    ctx.strokeStyle = mine ? 'rgba(255,255,255,0.96)' : 'rgba(255,255,255,0.56)';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x, y, r * 0.44, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `900 ${Math.max(18, r * 0.9)}px system-ui`;
    ctx.fillText(letter, x, y + 1);
    ctx.restore();
  }

  function drawPuck(puck) {
    if (!puck) return;

    const x = scaleX(puck.x);
    const y = scaleY(puck.y);
    const r = worldRadius(config.puckRadius);

    ctx.save();

    ctx.beginPath();
    ctx.ellipse(x, y + r * 0.42, r * 0.95, r * 0.42, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fill();

    const grad = ctx.createLinearGradient(x, y - r, x, y + r);
    grad.addColorStop(0, '#2b3442');
    grad.addColorStop(1, '#0b1220');

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.lineWidth = Math.max(1.5, r * 0.12);
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x - r * 0.28, y - r * 0.28, r * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fill();

    ctx.restore();
  }

  function drawWaiting() {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.font = '900 24px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Нажми "Играть онлайн"', window.innerWidth / 2, window.innerHeight / 2 - 16);
    ctx.font = '700 14px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillText('и дождись соперника', window.innerWidth / 2, window.innerHeight / 2 + 14);
    ctx.restore();
  }

  function updateVisualMallets(dt) {
    if (!gameState || !gameState.players) return;

    const mine = mySide ? gameState.players[mySide] : null;
    const enemy = mySide ? gameState.players[mySide === 'left' ? 'right' : 'left'] : null;

    if (mine) {
      if (!localMallet) {
        localMallet = {
          x: mine.x,
          y: mine.y,
          vx: 0,
          vy: 0,
          tx: mine.x,
          ty: mine.y,
          character: mine.character
        };
      }

      localMallet.character = mine.character;

      if (!pointerActive) {
        localMallet.tx = mine.x;
        localMallet.ty = mine.y;
        localMallet.x += (localMallet.tx - localMallet.x) * Math.min(1, dt * 18);
        localMallet.y += (localMallet.ty - localMallet.y) * Math.min(1, dt * 18);
      }
    }

    if (enemy) {
      if (!remoteMallet) {
        remoteMallet = {
          x: enemy.x,
          y: enemy.y,
          tx: enemy.x,
          ty: enemy.y,
          character: enemy.character
        };
      }

      remoteMallet.tx = enemy.x;
      remoteMallet.ty = enemy.y;
      remoteMallet.character = enemy.character;
      remoteMallet.x += (remoteMallet.tx - remoteMallet.x) * Math.min(1, dt * 14);
      remoteMallet.y += (remoteMallet.ty - remoteMallet.y) * Math.min(1, dt * 14);
    }
  }

  function frame(now) {
    const dt = Math.min(0.033, (now - lastFrame) / 1000);
    lastFrame = now;

    drawArena();

    if (gameState && gameState.players && gameState.puck) {
      updateVisualMallets(dt);

      const leftPlayer = mySide === 'left'
        ? { ...gameState.players.left, x: localMallet?.x ?? gameState.players.left.x, y: localMallet?.y ?? gameState.players.left.y, character: localMallet?.character ?? gameState.players.left.character }
        : { ...gameState.players.left, x: remoteMallet?.x ?? gameState.players.left.x, y: remoteMallet?.y ?? gameState.players.left.y, character: remoteMallet?.character ?? gameState.players.left.character };

      const rightPlayer = mySide === 'right'
        ? { ...gameState.players.right, x: localMallet?.x ?? gameState.players.right.x, y: localMallet?.y ?? gameState.players.right.y, character: localMallet?.character ?? gameState.players.right.character }
        : { ...gameState.players.right, x: remoteMallet?.x ?? gameState.players.right.x, y: remoteMallet?.y ?? gameState.players.right.y, character: remoteMallet?.character ?? gameState.players.right.character };

      drawMallet(leftPlayer, mySide === 'left');
      drawMallet(rightPlayer, mySide === 'right');
      drawPuck(gameState.puck);
    } else {
      drawWaiting();
    }

    rafId = requestAnimationFrame(frame);
  }

  function startQueue() {
    resultOverlay.classList.add('hidden');
    menu.classList.add('hidden');
    gameFinishedHandled = false;
    showCenter('Ищем соперника…');
    showHint('Как только второй игрок зайдёт, матч начнётся');
    statusText.textContent = 'Поиск матча';
    socket.emit('findMatch', { character: selectedCharacter });
  }

  function backToMenu() {
    resultOverlay.classList.add('hidden');
    menu.classList.remove('hidden');
    hideCenter();
    hideHint();
    mySide = null;
    gameState = null;
    localMallet = null;
    remoteMallet = null;
    gameFinishedHandled = false;
    statusText.textContent = 'Меню';
    scoreText.textContent = '0 : 0';
    youName.textContent = '—';
    enemyName.textContent = '—';
  }

  function resetProgress() {
    progress = { elo: 1000, matches: 0, character: selectedCharacter };
    saveProgress();
    renderMenuStats();
    showToast('Прогресс сброшен');
  }

  findBtn.onclick = startQueue;
  againBtn.onclick = startQueue;
  menuBtn.onclick = backToMenu;
  resetBtn.onclick = resetProgress;

  socket.on('connect', () => {
    showToast('Соединение установлено');
  });

  socket.on('disconnect', () => {
    showCenter('Нет соединения с сервером');
    hideHint();
    statusText.textContent = 'Оффлайн';
  });

  socket.on('queue', () => {
    menu.classList.add('hidden');
    showCenter('Ищем соперника…');
    showHint('Открой ссылку у друга или во второй вкладке');
    statusText.textContent = 'Поиск матча';
  });

  socket.on('matchFound', (payload) => {
    mySide = payload.side;
    localMallet = null;
    remoteMallet = null;
    gameFinishedHandled = false;

    hideCenter();
    showHint('Веди пальцем по своей половине поля');
    showToast('Соперник найден');

    statusText.textContent = mySide === 'left' ? 'Ты слева' : 'Ты справа';
    youName.textContent = selectedCharacter + (mySide === 'left' ? ' • слева' : ' • справа');
    enemyName.textContent = payload.opponent || 'Игрок';
  });

  socket.on('state', (payload) => {
    if (!payload) return;

    config = payload.config || config;
    gameState = payload.state || gameState;

    if (!gameState) return;

    scoreText.textContent = `${gameState.score.left} : ${gameState.score.right}`;

    if (gameState.status === 'playing') {
      statusText.textContent = 'Матч идёт';
      hideCenter();
      showHint('Веди пальцем по своей половине поля');
    } else if (gameState.status === 'goal') {
      statusText.textContent = 'Гол';
      showCenter(gameState.goalMessage || 'Гол!');
      showHint('Сейчас продолжим');
    } else if (gameState.status === 'finished') {
      statusText.textContent = 'Матч окончен';
      hideCenter();
      hideHint();

      if (!gameFinishedHandled) {
        gameFinishedHandled = true;
        const gain = Math.floor(Math.random() * 301) + 300;
        const myWon = gameState.winner === mySide;

        progress.elo += gain;
        progress.matches += 1;
        saveProgress();
        renderMenuStats();

        gainValue.textContent = `+${gain}`;
        newEloValue.textContent = progress.elo;
        newLevelValue.textContent = getLevel(progress.elo);
        resultTitle.textContent = myWon ? 'Победа!' : 'Матч окончен';
        resultSub.textContent = myWon
          ? 'Хорошая катка. ЭЛО уже начислено.'
          : 'Катка завершена. ЭЛО уже начислено.';
      }

      resultOverlay.classList.remove('hidden');
    }
  });

  socket.on('opponentLeft', () => {
    showCenter('Соперник вышел');
    hideHint();
    statusText.textContent = 'Соперник вышел';
    showToast('Соперник отключился');

    setTimeout(() => {
      backToMenu();
      hideCenter();
    }, 1200);
  });

  renderCharacters();
  renderMenuStats();
  resize();
  setupInput();
  window.addEventListener('resize', resize);

  if (rafId) cancelAnimationFrame(rafId);
  requestAnimationFrame((t) => {
    lastFrame = t;
    frame(t);
  });
})();
</script>
</body>
</html>
