<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#0f172a;overflow:hidden;}
canvas{width:100vw;height:100vh;touch-action:none;}
button{
position:absolute;top:20px;left:50%;transform:translateX(-50%);
padding:15px 25px;font-size:18px;background:#f59e0b;border:none;border-radius:12px;color:white;
}
#cheat{top:70px;background:#ef4444;}
</style>
</head>
<body>

<button id="play">Играть</button>
<button id="cheat">Читы</button>
<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const c=document.getElementById('c');
const ctx=c.getContext('2d');

let game=null;
let side=null;

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
addEventListener('resize',resize);

play.onclick=()=>socket.emit('find');

cheat.onclick=()=>{
const pass=prompt("Пароль");
socket.emit('cheat',pass);
};

socket.on('start',d=>{
side=d.side;
play.style.display='none';
});

socket.on('state',g=>game=g);

c.addEventListener('pointermove',e=>{
if(!game) return;

let x=e.clientX/innerWidth*1000;
let y=e.clientY/innerHeight*600;

if(side==="left") x=Math.min(x,500);
else x=Math.max(x,500);

socket.emit('move',{x,y});
});

function draw(){
ctx.clearRect(0,0,c.width,c.height);
if(!game) return requestAnimationFrame(draw);

const sx=x=>x/1000*c.width;
const sy=y=>y/600*c.height;

ctx.strokeStyle='white';
ctx.beginPath();
ctx.moveTo(c.width/2,0);
ctx.lineTo(c.width/2,c.height);
ctx.stroke();

ctx.beginPath();
ctx.arc(sx(game.puck.x),sy(game.puck.y),24,0,Math.PI*2);
ctx.fillStyle='white';
ctx.fill();

Object.values(game.players).forEach(p=>{
ctx.beginPath();
ctx.arc(sx(p.x),sy(p.y),55,0,Math.PI*2);
ctx.fillStyle=p.cheat?'red':'orange';
ctx.fill();
});

ctx.fillStyle='white';
ctx.font='30px Arial';
ctx.fillText(game.score.left+" : "+game.score.right,c.width/2-30,40);

requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
